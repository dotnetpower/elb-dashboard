# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: elb-dashboard
metadata:
  template: elb-dashboard@0.2.0

# This azure.yaml is configured for the BUNDLED CONTAINER APP topology
# (six sidecars: api, frontend, worker, beat, redis, terminal).
#
# Image build is handled by the postprovision hook via `az acr build`, not by
# `azd deploy` — that lets a fresh `git clone && azd up` go end-to-end
# without needing Docker locally.

infra:
  provider: bicep
  path: ./infra
  module: main

hooks:
  preprovision:
    shell: sh
    interactive: true
    continueOnError: false
    run: |
      set -eu
      if [ "${ELB_AZD_PROGRESS_PLAN_SHOWN:-}" != "true" ]; then
        bash ./scripts/dev/azd-progress.sh plan
      fi
      bash ./scripts/dev/azd-progress.sh step 1 "Provider registration" "Register required providers before Bicep starts."
      if [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]; then
        bash ./scripts/dev/register-providers.sh --subscription "$AZURE_SUBSCRIPTION_ID"
      else
        bash ./scripts/dev/register-providers.sh
      fi
      bash ./scripts/dev/azd-progress.sh done 1 "Provider registration"
      bash ./scripts/dev/azd-progress.sh step 2 "Bicep provision" "azd runs infra/main.bicep next; this is the main Azure resource creation phase."
      if [ -z "${API_CLIENT_ID:-}" ]; then
        bash ./scripts/dev/azd-progress.sh note "API_CLIENT_ID is not set yet. Step 3 will create/reuse the App Registration and persist it."
      fi
      bash ./scripts/dev/azd-progress.sh note "Preprovision OK. Handing off to azd provision."

  postprovision:
    shell: sh
    # interactive: true makes azd stream the hook's stdout/stderr to the
    # operator's terminal in real time so the timestamped progress lines from
    # postprovision.sh are visible while it runs (otherwise azd buffers
    # everything until the hook exits).
    interactive: true
    continueOnError: false
    run: |
      bash ./scripts/dev/postprovision.sh
