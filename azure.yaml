# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: elastic-blast-azure-functionapp
metadata:
  template: elastic-blast-azure-functionapp@0.1.0

services:
  # Backend: `azd deploy api` does NOT work for this Function App because it
  # omits .python_packages from the zip. Use `./scripts/dev/deploy-api.sh` instead.
  # For web-only changes, `azd deploy web --no-prompt` works fine.
  api:
    project: ./api
    language: python
    host: function
  web:
    project: ./web
    language: ts
    host: staticwebapp
    dist: dist

infra:
  provider: bicep
  path: ./infra
  module: main

hooks:
  preprovision:
    shell: sh
    run: |
      echo "Provisioning ElasticBLAST control plane (Function App + SWA + Key Vault + VNet + Storage)..."
