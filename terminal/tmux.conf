set -g mouse on
set -g history-limit 100000
set -g set-clipboard on

# Disable tmux's built-in right-click / middle-click context menus so the
# browser terminal feels like a plain shell. Right-click is rebound to the
# default text-selection paste behaviour; middle-click is a no-op.
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
unbind -n M-MouseDown3Pane
unbind -n MouseDown2Pane