name: Tests

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  pull_request:
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight runs for the same ref so a fresh push supersedes the old run.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: ruff + pytest (api/)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check api

      - name: pytest (fast loop — parallel, slow/subprocess excluded)
        # `-n 2` overrides pytest.ini's `-n auto` for CI only (local dev keeps
        # `auto`). The hosted runner has 4 vCPUs, so `auto` spawns 4 workers;
        # near the end of the suite their combined peak memory intermittently
        # tripped the OOM killer, which SIGKILLs a worker ("[gwN] node down:
        # Not properly terminated", no Python traceback). xdist's controller
        # then blocks forever waiting on the dead worker, which is how the step
        # used to run to the job cap. Halving the worker count halves peak
        # memory and removes the OOM crash; the suite still finishes in well
        # under a minute.
        #
        # The remaining safety nets (from pytest.ini + below) bound any future
        # stall regardless of cause: `--timeout=60` per test, `--session-timeout=300`
        # for a graceful whole-run abort, and this step-level `timeout-minutes`
        # as the final hard backstop — even if the xdist controller fully
        # deadlocks on a dead worker (the in-process session timeout cannot fire
        # in that case), Actions OS-kills the step at 6 minutes instead of
        # letting it hang to the job cap. Set CI=true so CI-aware code paths
        # (logging, color, etc.) behave correctly.
        timeout-minutes: 6
        env:
          CI: "true"
        run: uv run pytest -q api/tests -n 2
