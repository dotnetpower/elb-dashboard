name: Tests

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  pull_request:
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight runs for the same ref so a fresh push supersedes the old run.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: ruff + pytest (api/)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check api

      - name: pytest (fast loop — parallel, slow/subprocess excluded)
        # The default pytest.ini addopts already wire `-n auto`, the marker
        # filter, `--timeout=60` (per-test) and `--session-timeout=300`
        # (whole-run) safety nets, plus `faulthandler_timeout=90` for stack
        # dumps of a stuck test. This step-level `timeout-minutes` is the final
        # hard backstop: even if the xdist controller fully deadlocks (so the
        # in-process session timeout cannot fire), Actions OS-kills the step at
        # 6 minutes instead of letting it run to the job cap. Set CI=true so any
        # CI-aware code paths (logging, color, etc.) behave correctly.
        timeout-minutes: 6
        env:
          CI: "true"
        run: uv run pytest -q api/tests
