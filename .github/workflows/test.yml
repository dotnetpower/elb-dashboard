name: Tests

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  pull_request:
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight runs for the same ref so a fresh push supersedes the old run.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: ruff + pytest (api/)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check api

      - name: pytest (fast loop — slow/subprocess excluded)
        # Uses the default `-n auto` from pytest.ini (one xdist worker per
        # GitHub-hosted runner vCPU, currently 4). The legacy CI workaround
        # forced `-n0` (serial) because an xdist worker was intermittently
        # SIGKILLed near the end of the suite ("[gwN] node down: Not properly
        # terminated") and the controller then deadlocked on the dead node.
        # Commit 5a9cef6 traced the kill back to its real root cause — five
        # Redis-touching call sites (kombu probes + Celery result backend
        # update_state) inheriting the OS-default 75-120 s TCP connect timeout
        # — and capped them. With those bounded, the per-test 60 s
        # `pytest-timeout` no longer fires on a hanging socket, no worker
        # gets SIGKILLed, and parallel execution is safe again. Full suite
        # now ~2 min locally with `-n auto` (vs ~4 min serial).
        #
        # Backstops still bound any stall: `--timeout=60` per test and
        # `--session-timeout=300` (pytest.ini), plus this step-level
        # `timeout-minutes` as the final OS-level guard. Set CI=true so
        # CI-aware code paths (logging, color, etc.) behave correctly.
        timeout-minutes: 6
        env:
          CI: "true"
        run: uv run pytest -q api/tests
