name: Tests

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  pull_request:
    paths:
      - api/**
      - pyproject.toml
      - uv.lock
      - pytest.ini
      - .github/workflows/test.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight runs for the same ref so a fresh push supersedes the old run.
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: ruff + pytest (api/)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check api

      - name: pytest (fast loop — parallel, slow/subprocess excluded)
        # An xdist worker is intermittently SIGKILLed near the end of the suite
        # ("[gwN] node down: Not properly terminated", no Python traceback, no
        # faulthandler dump — the C dump thread dies with the process), which is
        # the signature of the kernel OOM-killer firing at peak memory. When it
        # happens the controller used to block forever on the dead worker and
        # run to the job cap. `--max-worker-restart=4` lets xdist respawn the
        # crashed worker and reschedule its tests so an isolated crash recovers
        # to green instead of wedging the run.
        #
        # Backstops bound any stall regardless of cause: `--timeout=60` per test
        # and `--session-timeout=300` (pytest.ini), plus this step-level
        # `timeout-minutes` as the final OS-level guard — Actions OS-kills the
        # step at 6 minutes even if the controller fully deadlocks on a dead
        # worker. Set CI=true so CI-aware code paths (logging, color, etc.)
        # behave correctly.
        timeout-minutes: 6
        env:
          CI: "true"
        run: uv run pytest -q api/tests --max-worker-restart=4
