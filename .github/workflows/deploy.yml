name: Deploy to Container App

# Deployment of pre-built images to the bundled Container App. Builds happen in
# `build-images.yml` on every push to main; this workflow only patches the
# running `ca-elb-dashboard` to a chosen tag (no rebuild).
#
# Two ways to start a deploy, both gated by the same `production` approval:
#   1. Automatic — after "Build Images" succeeds on main, this workflow is
#      triggered via `workflow_run`. It deploys ALL sidecars at the immutable
#      `gha-<sha>` tag the build just produced.
#   2. Manual — `workflow_dispatch` from the Actions UI, choosing the sidecar
#      and tag yourself (the original behaviour).
#
# In BOTH cases the job targets the `production` environment, whose required
# reviewer rule makes GitHub e-mail the reviewer (you) for approval before
# `az containerapp update` runs. Nothing reaches Azure until you click Approve
# in the run's "Review deployments" prompt (or the e-mail link). Reject to
# discard an auto-deploy you don't want.
#
# Configure the environment once at:
#   https://github.com/dotnetpower/elb-dashboard/settings/environments
#   → "production" → Required reviewers: <your GitHub user>
#
# Required repository secrets (shared with build-images.yml):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# Required repository variables:
#   ACR_NAME, ACR_LOGIN_SERVER, AZURE_RESOURCE_GROUP, CONTAINER_APP_NAME

on:
  workflow_dispatch:
    inputs:
      sidecar:
        description: "Which container to patch"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - worker
          - beat
          - frontend
          - terminal
      tag:
        description: "Image tag to deploy (default: latest-main)"
        required: true
        default: "latest-main"
        type: string
      skip_health_check:
        description: "Skip post-deploy /api/health smoke (default: false)"
        required: false
        default: false
        type: boolean
  # Auto-deploy path: fire after a successful Build Images run on main. The
  # job still stops at the production approval gate (e-mail), so this only
  # *offers* a deploy of the freshly built images — it never deploys on its own.
  workflow_run:
    workflows: ["Build Images"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  # Only one deploy at a time. cancel-in-progress=false because we never
  # want to abort an in-flight `az containerapp update`.
  group: deploy-container-app
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Manual dispatch always runs; the auto path only runs when the triggering
    # Build Images run succeeded (a failed/cancelled build never offers a deploy).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      # CONTAINER_APP_FQDN should be a repo variable; the env link lets the
      # GitHub UI show a click-through URL alongside the approval gate.
      url: https://${{ vars.CONTAINER_APP_FQDN }}/
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
      CONTAINER_APP_FQDN: ${{ vars.CONTAINER_APP_FQDN }}
    steps:
      - name: Resolve deploy parameters
        # Manual dispatch carries explicit inputs; the auto (workflow_run) path
        # has none, so default to ALL sidecars at the immutable gha-<sha> tag
        # the triggering build produced. Both paths feed the same steps below.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            sha='${{ github.event.workflow_run.head_sha }}'
            echo "DEPLOY_SIDECAR=all" >> "$GITHUB_ENV"
            echo "DEPLOY_TAG=gha-${sha:0:7}" >> "$GITHUB_ENV"
            echo "DEPLOY_SKIP_HEALTH=false" >> "$GITHUB_ENV"
            echo "Auto-deploy offer after build of ${sha:0:7} (all sidecars)"
          else
            echo "DEPLOY_SIDECAR=${{ inputs.sidecar }}" >> "$GITHUB_ENV"
            echo "DEPLOY_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
            echo "DEPLOY_SKIP_HEALTH=${{ inputs.skip_health_check }}" >> "$GITHUB_ENV"
            echo "Manual deploy: ${{ inputs.sidecar }} @ ${{ inputs.tag }}"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For the auto path, pin the build's commit so the deploy scripts
          # match the image that was built; manual dispatch uses the ref's HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp CLI extension
        # The runner's az CLI may not have the containerapp extension
        # pre-installed; quick-deploy.sh relies on `az containerapp update`.
        # --yes silences the prompt; --upgrade keeps an existing one fresh.
        run: az extension add --name containerapp --yes --upgrade -o none

      - name: Verify chosen image tag exists in ACR
        run: |
          set -euo pipefail
          tag="${DEPLOY_TAG}"
          sidecar="${DEPLOY_SIDECAR}"
          case "$sidecar" in
            all)      images=(elb-api elb-frontend elb-terminal) ;;
            api|worker|beat) images=(elb-api) ;;
            frontend) images=(elb-frontend) ;;
            terminal) images=(elb-terminal) ;;
            *) echo "unknown sidecar '$sidecar'" >&2; exit 1 ;;
          esac
          missing=0
          for img in "${images[@]}"; do
            if az acr repository show-tags --name "$ACR_NAME" --repository "$img" --query "[?@=='$tag']" -o tsv 2>/dev/null | grep -qx "$tag"; then
              echo "  ✓ $img:$tag"
            else
              echo "  ✗ $img:$tag NOT FOUND in ACR" >&2
              missing=1
            fi
          done
          [ "$missing" = "0" ] || { echo "Refusing to deploy — at least one image tag is missing. Run the Build Images workflow first." >&2; exit 1; }

      - name: Patch Container App (no rebuild)
        env:
          ELB_QUICK_DEPLOY_SKIP_CONFIRM: "1"
          SKIP_PROVIDER_REGISTRATION: "true"
        run: |
          set -euo pipefail
          bash scripts/dev/quick-deploy.sh "${DEPLOY_SIDECAR}" "${DEPLOY_TAG}" --no-build --yes

      - name: Smoke test /api/health
        if: ${{ env.DEPLOY_SKIP_HEALTH != 'true' }}
        run: |
          set -euo pipefail
          url="https://${CONTAINER_APP_FQDN}/api/health"
          # New revision activation can take 30-60s. Retry for up to 3 min.
          for i in $(seq 1 18); do
            status="$(curl -s -o /tmp/health.json -w '%{http_code}' --max-time 10 "$url" || echo 000)"
            if [ "$status" = "200" ]; then
              echo "==> /api/health OK after ${i}0s"
              cat /tmp/health.json
              exit 0
            fi
            echo "  [$i] status=$status, retrying in 10s..."
            sleep 10
          done
          echo "==> /api/health failed after 3 minutes" >&2
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deployment"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| trigger | \`${{ github.event_name }}\` |"
            echo "| sidecar | \`${DEPLOY_SIDECAR}\` |"
            echo "| tag | \`${DEPLOY_TAG}\` |"
            echo "| container app | \`${CONTAINER_APP_NAME}\` (${AZURE_RESOURCE_GROUP}) |"
            echo "| url | https://${CONTAINER_APP_FQDN}/ |"
          } >> "$GITHUB_STEP_SUMMARY"
