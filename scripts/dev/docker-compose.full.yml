# Full 6-sidecar local stack for the bundled Container App.
#
# Mirrors the production layout in infra/modules/containerAppControl.bicep
# (api, frontend, worker, beat, redis, terminal) so the things that have
# been hardest to debug remotely — celery routing, redis-wait,
# terminal/exec_server contract, route ordering, ttyd proxy — are all
# reproducible locally without an Azure round-trip.
#
# Differences from production (intentional):
#   * Source mounted as read-only volumes for hot reload (uvicorn --reload).
#     Code edits in api/ are visible to api / worker / beat in real time.
#   * EXEC_TOKEN is a fixed dev value, not a Container Apps secret.
#   * Storage / MI / Key Vault are NOT wired — AUTH_DEV_BYPASS=true short-
#     circuits the bearer check, and any Azure SDK call that needs MI will
#     fail (that is a feature, not a bug — it forces those code paths to
#     be tested separately).
#   * Frontend is vite dev (HMR) instead of nginx-served bundle. Same
#     reverse proxy surface from the api sidecar at /api/* vs /*.
#   * Probes are simplified to `healthcheck` blocks for compose semantics.
#
# Usage:
#   cd /home/moonchoi/dev/elb-dashboard
#   scripts/dev/local-run.sh compose-full -- up --build
#   scripts/dev/local-run.sh compose-full -- up -d --build  # detached + log follower
#
# Then in another terminal:
#   curl http://127.0.0.1:18080/api/health         # 200 from api
#   curl http://127.0.0.1:18080/api/me             # 200 with dev-bypass identity
#   curl http://127.0.0.1:18080/api/health/celery  # queue snapshot
#   curl -XPOST 'http://127.0.0.1:18080/api/health/celery/enqueue-noop?message=hi'
#   open http://127.0.0.1:18080/                   # SPA via api -> vite dev
#
# Tear down:
#   docker compose -f scripts/dev/docker-compose.full.yml down -v

name: elb-control-local

# WSL hosts inherit a DNS server (10.255.255.254) that lives on the WSL
# adapter and is unreachable from Docker's default user-defined bridge.
# Without `dns: [8.8.8.8, 1.1.1.1]` on each service the frontend
# `npm install`, the api outbound fetches, and any package install in a
# future build would all fail with `Temporary failure resolving ...`.
# Public resolvers cost nothing and only apply to dev compose — production
# never sees this.

services:
  # ---------------------------------------------------------------------
  # 1. redis — broker + result backend + ops bus (db 0/1/2)
  # ---------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    dns: [8.8.8.8, 1.1.1.1]
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
    networks: [elb]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------
  # 2. terminal — ttyd (7681) + exec_server (7682), loopback in prod;
  #    here we expose on the compose network so api/worker can reach it.
  # ---------------------------------------------------------------------
  terminal:
    dns: [8.8.8.8, 1.1.1.1]
    build:
      # Production builds this image with `az acr build ... terminal/`,
      # so the Dockerfile uses bare COPY paths (`profile.sh`, etc.).
      # Match that here - context MUST be the terminal/ folder.
      context: ../../terminal
      dockerfile: Dockerfile
      # WSL hosts inherit a DNS server (10.255.255.254) that the default
      # docker bridge cannot reach. `network: host` lets the build
      # container inherit the host resolver so apt-get works.
      network: host
    image: elb-terminal:dev
    environment:
      EXEC_TOKEN: dev-exec-token-not-secret-but-long-enough-for-startup-check
      EXEC_MAX_CONCURRENCY: "4"
      SIDECAR_NAME: terminal
      # The production Container App sidecars share loopback, so both ttyd
      # and exec_server bind 127.0.0.1 there. Docker Compose gives each
      # service its own network namespace, so the api / worker containers
      # must reach both ports through the `terminal` service DNS name.
      TTYD_HOST: 0.0.0.0
      EXEC_HOST: 0.0.0.0
      # cgroup_reporter publishes to the shared ops bus (redis db 2). In
      # prod the api/worker default is 127.0.0.1, but in compose each
      # service is its own net namespace — must point at the redis svc.
      OPS_REDIS_URL: redis://redis:6379/2
      # Local browser-submit smoke tests use the host az login cache for
      # exec_server commands. Production does not mount this path and uses
      # managed identity instead.
      EXEC_AZURE_CONFIG_DIR: /tmp/elb-exec-azure
      # Skip MSI bootstrap — the toolchain in this sidecar does not need
      # to authenticate against Azure for local debug.
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-common}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-00000000-0000-0000-0000-000000000000}
    volumes:
      - ${HOME}/.azure:/tmp/elb-exec-azure
    networks: [elb]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; ok=True\nfor url in ('http://127.0.0.1:7681/','http://127.0.0.1:7682/healthz'):\n    try:\n        ok = ok and urllib.request.urlopen(url, timeout=2).status < 500\n    except Exception:\n        ok = False\nsys.exit(0 if ok else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ---------------------------------------------------------------------
  # 3. frontend — vite dev with HMR on :8081 (proxied by api as /*)
  # ---------------------------------------------------------------------
  frontend:
    dns: [8.8.8.8, 1.1.1.1]
    image: node:20-alpine
    working_dir: /web
    # 1) Install python3 + redis-py (one-shot, ~25 MB) so the standalone
    #    cgroup_reporter can publish to the ops bus from inside the vite
    #    container — production uses a different image (web/Dockerfile,
    #    nginx + supervisord) but compose stays vite-with-HMR for dev.
    # 2) Background the reporter, then exec vite as PID 1 replacement so
    #    Ctrl-C / compose-stop still kill the container cleanly.
    command:
      - sh
      - -lc
      - |
        set -e
        if ! command -v python3 >/dev/null 2>&1; then
          apk add --no-cache python3 py3-redis >/dev/null
        fi
        npm install --no-audit --no-fund --prefer-offline
        python3 /web/cgroup_reporter.py "$$SIDECAR_NAME" &
        exec npm run dev -- --host 0.0.0.0 --port 8081
    volumes:
      - ../../web:/web
      - frontend_node_modules:/web/node_modules
    environment:
      # Empty / unset — SPA falls back to same-origin so /api/* hits the
      # api sidecar via the compose-published port (18080), not the host
      # workspace `api: start` task on 8080.
      VITE_API_BASE_URL: ""
      VITE_HMR_HOST: 127.0.0.1
      VITE_HMR_CLIENT_PORT: "8081"
      SIDECAR_NAME: frontend
      # cgroup_reporter target — see terminal/api services for the same
      # cross-namespace override.
      OPS_REDIS_URL: redis://redis:6379/2
    ports:
      # Vite injects an HMR WebSocket pointing at the dev server's own
      # host/port. The app is still browsed through the api proxy on
      # 18080, but publishing 8081 keeps HMR from retrying forever with
      # ws://localhost:8081 connection-refused noise.
      - "127.0.0.1:8081:8081"
    networks: [elb]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8081/"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  # ---------------------------------------------------------------------
  # 4. api — FastAPI + reverse proxy. uvicorn --reload watches /app/api.
  # ---------------------------------------------------------------------
  api:
    dns: [8.8.8.8, 1.1.1.1]
    build:
      context: ../..
      dockerfile: api/Dockerfile
      target: dev    # adds az CLI on top of runtime — see api/Dockerfile
      network: host  # WSL DNS workaround — see `terminal:` above
    image: elb-api:dev
    user: "0:0"  # bind-mount friendliness for --reload watcher
    command:
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --reload
      - --reload-dir
      - /app/api
      - --reload-exclude
      - api/tests/*
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    environment:
      AUTH_DEV_BYPASS: "true"
      LOG_LEVEL: DEBUG
      ENABLE_DOCS: "true"
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-common}
      API_CLIENT_ID: ${API_CLIENT_ID:-00000000-0000-0000-0000-000000000000}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-00000000-0000-0000-0000-000000000000}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-00000000-0000-0000-0000-000000000000}
      AZURE_TABLE_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.table.core.windows.net
      AZURE_BLOB_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.blob.core.windows.net
      # Cross-sidecar wiring (overrides the prod defaults that point at
      # 127.0.0.1, since each compose service is its own net namespace).
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPS_REDIS_URL: redis://redis:6379/2
      FRONTEND_UPSTREAM: http://frontend:8081
      TERMINAL_UPSTREAM: http://terminal:7681
      TERMINAL_EXEC_UPSTREAM: http://terminal:7682
      TERMINAL_SHELL_USER: azureuser
      EXEC_TOKEN: dev-exec-token-not-secret-but-long-enough-for-startup-check
      # Point DefaultAzureCredential's AzureCliCredential at the host's
      # `az login` (mounted read-only below). Without this the api sidecar
      # has no Azure credential at all and every /api/arm/* call returns
      # an empty/degraded response. Production uses Managed Identity and
      # never sets AZURE_CONFIG_DIR.
      AZURE_CONFIG_DIR: /root/.azure
    volumes:
      - ../../api:/app/api:ro
      # Host `az login` token cache. Mounted RW (not RO) because az CLI
      # writes versionCheck.json / extensionIndex.json on first invoke;
      # an RO mount makes every `az` call fail and we fall straight back
      # to the empty-subscription path. Trade-off: the dev container can
      # update the host's `~/.azure` (token refresh, version markers).
      - ${HOME}/.azure:/root/.azure
    ports:
      # Bind compose api on 18080 to avoid clashing with the workspace
      # `api: start` (8080) and `web: dev` (8090) tasks. Browse to
      # http://127.0.0.1:18080/ to hit the compose stack.
      - "18080:8080"
    networks: [elb]
    depends_on:
      redis:
        condition: service_healthy
      frontend:
        condition: service_started
      terminal:
        condition: service_started

  # ---------------------------------------------------------------------
  # 5. worker — celery worker, same image as api, picks up source via mount
  # ---------------------------------------------------------------------
  worker:
    dns: [8.8.8.8, 1.1.1.1]
    # Same image name as the api service so docker compose reuses the
    # build cache (one build, three containers). The `build:` block is
    # required even though the image is shared — without it `compose up`
    # tries to PULL elb-api:dev (which doesn't exist on any registry).
    build:
      context: ../..
      dockerfile: api/Dockerfile
      target: dev    # adds az CLI — must match api: target so build cache is reused
      network: host  # WSL DNS workaround
    image: elb-api:dev
    user: "0:0"
    command:
      - python3
      - /app/api/wait_redis.py
      - python3
      - /app/api/run_celery_workers.py
    environment:
      LOG_LEVEL: DEBUG
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-common}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-00000000-0000-0000-0000-000000000000}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-00000000-0000-0000-0000-000000000000}
      AZURE_TABLE_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.table.core.windows.net
      AZURE_BLOB_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.blob.core.windows.net
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPS_REDIS_URL: redis://redis:6379/2
      TERMINAL_EXEC_UPSTREAM: http://terminal:7682
      EXEC_TOKEN: dev-exec-token-not-secret-but-long-enough-for-startup-check
      AZURE_CONFIG_DIR: /root/.azure
    volumes:
      - ../../api:/app/api:ro
      - ${HOME}/.azure:/root/.azure  # see api: comment about RW vs RO
    networks: [elb]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
      terminal:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/app/.venv/bin/celery -A api.celery_app:celery_app inspect ping -d celery@$$(hostname) --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ---------------------------------------------------------------------
  # 6. beat — celery beat singleton; same image as api
  # ---------------------------------------------------------------------
  beat:
    dns: [8.8.8.8, 1.1.1.1]
    # See worker: identical build block so compose builds (not pulls)
    # and shares the cache with api / worker.
    build:
      context: ../..
      dockerfile: api/Dockerfile
      target: dev    # match api/worker so build cache is reused
      network: host  # WSL DNS workaround
    image: elb-api:dev
    user: "0:0"
    command:
      - python3
      - /app/api/wait_redis.py
      - celery
      - -A
      - api.celery_app:celery_app
      - beat
      - --loglevel=info
      - --schedule=/tmp/celerybeat-schedule
      - --pidfile=/tmp/celerybeat.pid
    environment:
      LOG_LEVEL: DEBUG
      AZURE_TABLE_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.table.core.windows.net
      AZURE_BLOB_ENDPOINT: https://${ELB_LOCAL_STORAGE_ACCOUNT:-elbstg01}.blob.core.windows.net
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPS_REDIS_URL: redis://redis:6379/2
    volumes:
      - ../../api:/app/api:ro
    networks: [elb]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  elb:
    driver: bridge

volumes:
  frontend_node_modules:
