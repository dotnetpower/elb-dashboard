# nginx config for the frontend sidecar.
# Listens on 127.0.0.1:8081 only — the api sidecar reverse-proxies to it.
# Carries the security headers that today live in staticwebapp.config.json.

server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Mask the nginx version banner (`Server: nginx/<version>` → `Server: nginx`)
    # so the frontend sidecar does not leak its build to the public ingress.
    server_tokens off;

    gzip on;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # Security headers (ported from web/staticwebapp.config.json globalHeaders).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP allows the SPA to call MSAL + ARM + ipify + same-origin /api.
    # The NCBI Sequence Viewer (sviewer) in-page embed on SequenceDetail loads
    # its JS widget (`sviewer.js`) + ExtJS, fetches track data over CORS, and
    # renders track graphics as <img> — all from www.ncbi.nlm.nih.gov — so that
    # origin is allowed in script-src / connect-src / img-src / style-src.
    # `frame-src` stays for the iframes the widget may create internally. The
    # embed is opt-in (loaded only on user click). Update if the SPA adds new
    # external endpoints. NOTE: if NCBI's ExtJS build ever requires runtime
    # eval, add `'unsafe-eval'` to script-src (kept out for now to keep the
    # SPA's script surface tight).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.ncbi.nlm.nih.gov; style-src 'self' 'unsafe-inline' https://www.ncbi.nlm.nih.gov; connect-src 'self' https://login.microsoftonline.com https://management.azure.com https://api.ipify.org https://www.ncbi.nlm.nih.gov; img-src 'self' data: https://www.ncbi.nlm.nih.gov; font-src 'self'; frame-src https://www.ncbi.nlm.nih.gov" always;

    # Hashed Vite assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # The shell html must always be revalidated so a redeploy is picked up.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }

    # Runtime configuration is rewritten by entrypoint.sh on every container
    # start. It must NEVER be cached — otherwise a frontend env patch (e.g.
    # fixing VITE_API_BASE_URL) cannot take effect until users manually clear
    # disk cache. See docs/features_change/2026-05/2026-05-21-frontend-api-base-url-guard.md.
    location = /runtime-config.js {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
        try_files /runtime-config.js =404;
    }

    # SPA navigation fallback. Any non-asset path that does not exist on disk
    # falls through to /index.html with status 200 so React Router takes over.
    # Real 404s for /api/* never reach here because the api sidecar handles
    # /api/* directly and only forwards everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tighten access logs in production. Errors stay on stderr.
    access_log off;
    error_log /dev/stderr warn;
}
