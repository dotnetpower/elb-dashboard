site_name: ElasticBLAST Control Plane
site_description: Browser-only control plane for ElasticBLAST on Azure. Run large BLAST sequence searches on AKS from a browser — no SSH, no SAS tokens, no local CLI.
site_author: dotnetpower
site_url: https://dotnetpower.github.io/elb-dashboard/
repo_url: https://github.com/dotnetpower/elb-dashboard
repo_name: dotnetpower/elb-dashboard
edit_uri: edit/main/docs/
copyright: Copyright &copy; dotnetpower — ElasticBLAST Control Plane. Documentation released under CC BY 4.0.

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: images/elasticblast-logo.svg
  favicon: images/elasticblast-logo.svg
  palette:
    scheme: default
    primary: white
    accent: deep purple
  font: false
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false
  # Google Analytics 4. Material injects the standard gtag.js snippet
  # (async loader + dataLayer + config call) when both fields are set.
  analytics:
    provider: google
    property: G-B4Z6EK09NP
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dotnetpower/elb-dashboard
      name: ElasticBLAST Control Plane on GitHub
  # Open Graph / GEO defaults consumed by docs/overrides/partials/meta.html.
  og:
    image: images/elasticblast-logo.svg
    type: website
    locale: en_US
    site_name: ElasticBLAST Control Plane
  llms:
    txt: llms.txt
    full: llms-full.txt

nav:
  - Overview: index.md
  - Get Started: get-started.md
  - Deployment Reference: deployment-reference.md
  - Auth: auth.md
  - Change Log: changelog.md
  - Releases:
      - Overview: releases/index.md
      - Unreleased: releases/unreleased.md
      - v0.1.0: releases/v0.1.0.md
  - User Guide:
      - Guide Home: user-guide/index.md
      - Dashboard: user-guide/dashboard.md
      - New Search: user-guide/new-search.md
      - Jobs: user-guide/jobs.md
      - Results: user-guide/results.md
      - API Reference: user-guide/api-reference.md
      - UI Preview: user-guide/ui-preview.md
      - Terminal: user-guide/terminal.md
  - Contributor Guide:
      - Screenshot Workflow: contributor-guide/screenshot-workflow.md
  - Architecture:
      - High Level Architecture: high-level-architecture.md
      - Container Apps Migration: container-apps-migration.md
      - BLAST SearchSP Discovery: blast-searchsp-discovery.md
      - Web BLAST Compatibility Plan: web-blast-compatibility-implementation-plan.md
  - Agent Reference:
      - Repo Layout: copilot/repo-layout.md
      - Auth Flow: copilot/auth-flow.md
      - Browser Terminal: copilot/browser-terminal.md
      - Resource Plane: copilot/resource-plane.md
      - Monitoring UI: copilot/monitoring-ui.md
      - Glass UI: copilot/glass-ui.md
      - Codebase Map: copilot/codebase-map.md

extra_javascript:
  - javascripts/external-links.js
  - javascripts/image-viewer.js
  - javascripts/vendor/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/image-viewer.css
  - stylesheets/mermaid.css

exclude_docs: |
  temp/**

not_in_nav: |
  features_change/**/*.md

plugins:
  - search:
      lang: en
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1f1d3a"
        color: "#f5f4ff"
        font_family: Roboto

hooks:
  - scripts/docs/llms_hooks.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - tables
  - toc:
      permalink: true

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore