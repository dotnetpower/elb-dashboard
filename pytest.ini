[pytest]
testpaths = api/tests
python_files = test_*.py
addopts = -ra --strict-markers
markers =
    slow: test takes >= 0.5 s of call time; deselect with `-m "not slow"` for fast dev loop.
    subprocess: spawns an external process via `subprocess.run` / `Popen`; deselect with `-m "not subprocess"` when iterating on non-shell logic.
