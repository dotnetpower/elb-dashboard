[pytest]
testpaths = api/tests
python_files = test_*.py
# pythonpath=. lets the test layout import the `api` package without
# the sys.path manipulation that used to live in api/conftest.py.
pythonpath = .
# Default dev loop: parallel + skip slow / subprocess-spawning tests.
# Run the full suite with: `uv run pytest api/tests -m ""` (or via the
# `tests: full` VS Code task).
# Run just the slow / subprocess suites with: `-m "slow or subprocess"`.
addopts =
    -ra
    --strict-markers
    -n auto
    --dist loadfile
    -m "not slow and not subprocess"
    --timeout=60
    --timeout-method=thread
    --session-timeout=300
# Per-test wall-clock cap (60 s, thread method) catches a single stuck test, but
# the thread method cannot interrupt a worker blocked in a C-level syscall, which
# is how the suite previously hung when a Redis-touching call site inherited the
# OS-default 75-120 s TCP connect timeout (fixed in commit 5a9cef6 — see
# api/celery_app.py `fast_probe_connection` and the bounded
# `redis_socket_connect_timeout` / `result_backend_transport_options`).
# `--session-timeout=300` stays as a controller-side hard wall-clock bound on the
# whole run (current runtime ~70 s in CI, ~140 s locally with `-n auto`, so 300 s
# is a >2x margin) that aborts the session and reports
# `xdist.dsession.Interrupted` instead of hanging if a future regression
# re-introduces a similar blocking call.
# We deliberately do NOT set pytest's `faulthandler_timeout` here: that arms a
# per-test timer that pytest cancels/re-arms around every test, which would stomp
# the session-wide `faulthandler.dump_traceback_later(..., repeat=True)` watchdog
# installed in api/tests/conftest.py. That watchdog (default 180 s, override via
# ELB_TEST_FAULTHANDLER_TIMEOUT) is the one that dumps every thread's stack — and
# crucially it also covers stalls outside a test's call phase (collection, xdist
# worker setup/teardown), which a per-test faulthandler timer cannot see.
markers =
    slow: test takes >= 0.5 s of call time; excluded from the default dev loop. Run with `-m "not slow"` to omit explicitly, or `-m ""` for everything.
    subprocess: spawns an external process via `subprocess.run` / `Popen`; excluded from the default dev loop. These are typically also covered by `slow`.
