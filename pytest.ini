[pytest]
testpaths = api/tests
python_files = test_*.py
# pythonpath=. lets the test layout import the `api` package without
# the sys.path manipulation that used to live in api/conftest.py.
pythonpath = .
# Default dev loop: parallel + skip slow / subprocess-spawning tests.
# Run the full suite with: `uv run pytest api/tests -m ""` (or via the
# `tests: full` VS Code task).
# Run just the slow / subprocess suites with: `-m "slow or subprocess"`.
addopts =
    -ra
    --strict-markers
    -n auto
    --dist worksteal
    -m "not slow and not subprocess"
    --timeout=60
    --timeout-method=thread
markers =
    slow: test takes >= 0.5 s of call time; excluded from the default dev loop. Run with `-m "not slow"` to omit explicitly, or `-m ""` for everything.
    subprocess: spawns an external process via `subprocess.run` / `Popen`; excluded from the default dev loop. These are typically also covered by `slow`.
